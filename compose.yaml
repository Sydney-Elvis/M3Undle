services:
  m3undle:
    build:
      context: .
      dockerfile: Dockerfile
    image: m3undle:local
    container_name: m3undle
    user: "${PUID}:${PGID}"
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      TZ: UTC
      M3UNDLE_M3U_DIR: /m3u_data
    volumes:
      - ./data:/data
      - ./m3u_data:/m3u_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
